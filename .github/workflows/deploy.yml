name: Deploy Bunny Dash to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger manually from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload entire repo as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the repo root — includes index.html (gate) + game/ folder
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
